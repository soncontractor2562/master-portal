<!DOCTYPE html>
<html lang="th" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SON CONTRACTOR | Control Center</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    
    <!-- Mobile PWA / iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0f19" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Tailwind Play CDN as backup fallback + custom style sheet -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              darkBg: '#090d16',
              glassCard: 'rgba(18, 26, 44, 0.7)',
              glassBorder: 'rgba(255, 255, 255, 0.08)',
              brandBlue: '#3b82f6',
              brandCyan: '#06b6d4',
              brandPurple: '#8b5cf6',
              brandEmerald: '#10b981',
              brandAmber: '#f59e0b',
            },
            fontFamily: {
              sans: ['Prompt', 'Sarabun', 'Outfit', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-[#090d16] text-slate-100 font-sans antialiased select-none overscroll-none overflow-x-hidden min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
